<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>HTML Assigment 4 App 1</title>
	<link rel="stylesheet" type="text/css" href="style.css">
	<link rel="icon" type="image/x-icon" href="favicon-16x16.png">
	<a href="reaction.html">Link to Reaction Tester App</a>
</head>
<body>
	<h1>Tip Calculator</h1>
	<form>
		<label>Subtotal</label><br>
		<input type="text" id="subtotal"><br>

		<label>Tips</label><br>
		
		
	    <select id="Tipe"><!--no input for dropdown-->
	        <option value="100">None</option>
	        <option value="110">10%</option>
	        <option value="115">15%</option>
	        <option value="120">20%</option>
	    </select>
	     
	    <br>
	    
		<label>Groups </label><br>
		<select id="People">
			<option value="1">1</option>
			<option value="2">2</option>
			<option value="3">3</option>
			<option value="4">4</option>
			<option value="5">5</option>
			<option value="6">6</option>
			<option value="7">7</option>
			<option value="8">8</option>
			<option value="9">9</option>
			<option value="10">10</option>
		</select>
			
			<br>
			

			<input type="button" value="Submit" onclick="calculate()">
		<input type="reset"><br>

	</form>
	<p id="output"></p>
	<p id="TipDisplay">&copy;</p>
	<p id="Final"></p>

	<script src="calc.js"></script>

	
	
</body>
</html>
