<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tip Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/icon" href="apple-touch-icon.png">
</head>
<body>
    <div class="calculator">
        <h1>Tip Calculator</h1>
        
        <div class="input-section">
            <label for="subtotal">Bill Amount:</label>
            <input type="number" id="subtotal" placeholder="Enter bill amount">
        </div>
        
        <div class="tax-section">
            <p>+ GST (5%)</p>
            <div class="result">
                <span>After Tax Total:</span>
                <span id="after-tax">$0.00</span>
            </div>
        </div>
        
        <div class="tip-section">
            <label for="tip">Tip Percentage:</label>
            <select id="tip">
                <option value="0">No Tip. Are you sure? (0%)</option>
                <option value="10">Fair. Fine (10%)</option>
                <option value="15" selected>Good, a little bit more, please?(15%)</option>
                <option value="20">Great, excellent!! Thank you!(20%)</option>
            </select>
        </div>
        
        <div class="total-section">
            <div class="result">
                <span>Total After Tip:</span>
                <span id="total-after-tip">$0.00</span>
            </div>
        </div>
        
        <div class="split-section">
            <label for="split">Split Between:</label>
            <select id="split">
                <option value="1">1 person</option>
                <option value="2" selected>2 people</option>
                <option value="3">3 people</option>
                <option value="4">4 people</option>
                <option value="5">5 people</option>
            </select>
        </div>
        
        <div class="split-total">
            <div class="result">
                <span>Each Person Pays:</span>
                <span id="after-split">$0.00</span>
            </div>
        </div>
        
        <div class="buttons">
            <button onclick="calculate()">Calculate</button>
            <button onclick="resetForm()">Clear</button>
        </div>
        
        <div class="link">
            <a href="reaction.html">Go to App 2</a>
        </div>
    </div>

    <script src="calc.js"></script>
</body>
</html>
